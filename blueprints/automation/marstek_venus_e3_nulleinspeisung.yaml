blueprint:
  name: "🔋 Marstek Venus E3 – Nulleinspeisung (Force Mode + RS485)"
  description: >
    **Dynamische Nulleinspeisung für den Marstek Venus E3.**


    Regelt Laden/Entladen über den **Force Mode** und den **RS485-Steuermodus**
    – beides wird automatisch gesetzt. Ohne diese beiden Entitäten funktioniert
    die Steuerung über Home Assistant nicht.


    **Regelablauf:**

    • Netzbezug → Force Mode = Entladen, Entladeleistung wird schrittweise erhöht

    • Einspeisung → Force Mode = Laden, Ladeleistung wird schrittweise erhöht

    • In der Totzone → Force Mode = Standby (Marstek regelt selbst im Eigenverbrauch)


    **Schutzfunktionen:**

    • ⚠️ Tiefentladeschutz (Mindest-SoC)

    • 🌙 Nacht-Reserve

    • 🔒 Netzladen-Sperre

    • 🎯 Konfigurierbares Deadband


    ⚡ Entwickelt von [LichtValleyApps.de](https://lichtvalleyapps.de)

  domain: automation
  author: "LichtValleyApps.de"
  source_url: "https://github.com/HatchetMan111/marstek-venus-e3-nulleinspeisung-blueprint/blob/main/blueprints/automation/marstek_venus_e3_nulleinspeisung.yaml"
  homeassistant:
    min_version: "2024.6.0"

  input:

    # ================================================================
    # SEKTION 1: NETZMESSUNG
    # ================================================================
    section_grid:
      name: "📡 Netz-Messung"
      icon: "mdi:transmission-tower"
      description: >
        Wähle deinen Messtyp.
        Option A: Ein Sensor mit positiven/negativen Werten (Shelly EM, Eastron).
        Option B: Zwei getrennte Sensoren für Bezug und Einspeisung
        (z.B. Tibber Pulse, ISKRA, Discovergy).
      input:
        grid_sensor_mode:
          name: "Sensor-Typ"
          description: >
            KOMBINIERT = Ein Sensor (positiv=Bezug, negativ=Einspeisung).
            GETRENNT = Zwei Sensoren (Bezug + Einspeisung, beide immer positiv).
          default: "kombiniert"
          selector:
            select:
              options:
                - label: "Kombiniert (ein Sensor, +/- Vorzeichen)"
                  value: "kombiniert"
                - label: "Getrennt (Tibber Pulse, zwei Sensoren)"
                  value: "getrennt"

        grid_power_combined:
          name: "Netzleistung – Kombinierter Sensor (W)"
          description: >
            Nur bei Typ KOMBINIERT. Positiv = Bezug, negativ = Einspeisung.
            Nicht benötigt bei Typ GETRENNT → beliebige Entität wählen.
          selector:
            entity:
              domain: sensor
              device_class: power

        grid_power_import:
          name: "Netzbezug-Sensor – Eingang (W oder kW)"
          description: >
            Nur bei Typ GETRENNT. Immer positiver Wert, wenn du Strom kaufst.
            Nicht benötigt bei Typ KOMBINIERT → beliebige Entität wählen.
          selector:
            entity:
              domain: sensor

        grid_power_export:
          name: "Netzeinspeisung-Sensor – Ausgang (W oder kW)"
          description: >
            Nur bei Typ GETRENNT. Immer positiver Wert, wenn du einspeist.
            Nicht benötigt bei Typ KOMBINIERT → beliebige Entität wählen.
          selector:
            entity:
              domain: sensor

        grid_unit_factor:
          name: "Einheit des Netz-Sensors"
          description: >
            Watt (W) = kein Umrechnen (Shelly EM, Eastron SDM).
            Kilowatt (kW) = wird mit 1000 multipliziert (Tibber Pulse, Discovergy).
          default: "1"
          selector:
            select:
              options:
                - label: "Watt (W) – kein Umrechnen"
                  value: "1"
                - label: "Kilowatt (kW) → automatisch mal 1000"
                  value: "1000"

    # ================================================================
    # SEKTION 2: MARSTEK ENTITÄTEN
    # ================================================================
    section_battery:
      name: "🔋 Marstek Venus E3 – Entitäten"
      icon: "mdi:battery-charging-80"
      description: >
        Alle Entitäten unter: Einstellungen → Geräte & Dienste → Marstek → [Gerät].
      input:
        marstek_soc_sensor:
          name: "Batterie-Ladezustand (SoC %)"
          description: "Sensor: 'Batterie-Ladezustand'"
          selector:
            entity:
              domain: sensor
              device_class: battery

        marstek_charge_power:
          name: "Ladeleistung einstellen (Number W)"
          description: "Number: 'Ladeleistung einstellen'"
          selector:
            entity:
              domain: number

        marstek_discharge_power:
          name: "Entladeleistung einstellen (Number W)"
          description: "Number: 'Entladeleistung einstellen'"
          selector:
            entity:
              domain: number

        marstek_force_mode:
          name: "⚡ Force Mode (Select) – PFLICHT"
          description: >
            Select: 'Force Mode' mit Optionen Laden / Entladen / Standby.
            Dies ist der Hauptschalter – ohne diese Entität funktioniert
            die Steuerung NICHT.
          selector:
            entity:
              domain: select

        marstek_rs485_mode:
          name: "🔌 RS485-Steuermodus (Select) – PFLICHT"
          description: >
            Select: 'RS485-Steuermodus'.
            Muss auf RS485 stehen, sonst ignoriert der Marstek alle Befehle.
            Wird automatisch aktiviert.
          selector:
            entity:
              domain: select

    # ================================================================
    # SEKTION 3: FORCE MODE OPTIONSNAMEN
    # ================================================================
    section_force_mode_options:
      name: "🎛️ Force Mode – Optionsnamen"
      icon: "mdi:format-list-bulleted"
      collapsed: true
      description: >
        Die exakten Optionsnamen deiner Force-Mode-Select-Entität.
        Prüfe sie unter Entwicklertools → Zustände.
        Standard: Laden / Entladen / Standby.
      input:
        force_mode_charge:
          name: "Option für Laden"
          description: >
            Exakter Text der Laden-Option deiner Force-Mode-Entity.
            Standard Marstek Venus Modbus Integration: charge
          default: "charge"
          selector:
            text:

        force_mode_discharge:
          name: "Option für Entladen"
          description: >
            Exakter Text der Entladen-Option.
            Standard Marstek Venus Modbus Integration: discharge
          default: "discharge"
          selector:
            text:

        force_mode_standby:
          name: "Option für Standby"
          description: >
            Exakter Text der Standby-Option (Marstek regelt selbst im Eigenverbrauch).
            Standard Marstek Venus Modbus Integration: standby
          default: "standby"
          selector:
            text:

        rs485_option_name:
          name: "Option für RS485-Steuermodus"
          description: "Exakter Text der RS485-Option im RS485-Steuermodus-Select"
          default: "RS485"
          selector:
            text:

    # ================================================================
    # SEKTION 4: REGELPARAMETER
    # ================================================================
    section_regulation:
      name: "⚙️ Regelparameter"
      icon: "mdi:tune-variant"
      description: "Schrittweise Regelung – sanft und stabil."
      input:
        target_grid_power:
          name: "Ziel-Netzleistung (W)"
          description: >
            Angestrebter Netzwert. Empfehlung: 20–50 W Sicherheitspuffer.
          default: 30
          selector:
            number:
              min: -50
              max: 200
              step: 10
              unit_of_measurement: "W"
              mode: slider

        dead_band:
          name: "Totzone / Deadband (W)"
          description: >
            Bereich um den Zielwert, in dem auf Standby gewechselt wird.
            Empfehlung: 30–60 W. Bei Schwingen erhöhen.
          default: 50
          selector:
            number:
              min: 10
              max: 300
              step: 10
              unit_of_measurement: "W"
              mode: slider

        step_discharge:
          name: "Schrittweite Entladen (W)"
          description: >
            Um wie viel Watt die Entladeleistung pro Zyklus erhöht/reduziert wird.
            Empfehlung: 80–150 W.
          default: 100
          selector:
            number:
              min: 20
              max: 500
              step: 10
              unit_of_measurement: "W"
              mode: slider

        step_charge:
          name: "Schrittweite Laden (W)"
          description: "Empfehlung: 70–120 W."
          default: 80
          selector:
            number:
              min: 20
              max: 500
              step: 10
              unit_of_measurement: "W"
              mode: slider

        delay_after_step:
          name: "Verzögerung nach Regelschritt (Sekunden)"
          description: >
            Wartezeit nach jedem Schritt, damit der Marstek reagieren kann.
            Empfehlung: 5–10 s.
          default: 7
          selector:
            number:
              min: 2
              max: 30
              step: 1
              unit_of_measurement: "s"
              mode: slider

        max_charge_power:
          name: "Maximale Ladeleistung (W)"
          description: "Marstek Venus E3 max: 2500 W"
          default: 2400
          selector:
            number:
              min: 100
              max: 2500
              step: 50
              unit_of_measurement: "W"
              mode: slider

        max_discharge_power:
          name: "Maximale Entladeleistung (W)"
          description: "Marstek Venus E3 max: 2500 W"
          default: 2400
          selector:
            number:
              min: 100
              max: 2500
              step: 50
              unit_of_measurement: "W"
              mode: slider

        min_soc_protection:
          name: "Tiefentladeschutz – Mindest-SoC (%)"
          description: "Unter diesem SoC → Force Mode Standby, kein Entladen."
          default: 10
          selector:
            number:
              min: 5
              max: 30
              step: 1
              unit_of_measurement: "%"
              mode: slider

        max_soc_charging:
          name: "Ladelimit – Max-SoC (%)"
          description: "Über diesem SoC wird nicht mehr geladen."
          default: 95
          selector:
            number:
              min: 50
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

    # ================================================================
    # SEKTION 5: NACHT-MODUS
    # ================================================================
    section_night:
      name: "🌙 Nacht-Modus & Reserve"
      icon: "mdi:weather-night"
      collapsed: true
      input:
        night_reserve_enabled:
          name: "Nacht-Reserve aktivieren"
          default: true
          selector:
            boolean:

        night_min_soc:
          name: "Nacht-Reserve SoC (%)"
          description: "Mindest-SoC nachts. Empfehlung: 20–30 %."
          default: 20
          selector:
            number:
              min: 0
              max: 80
              step: 5
              unit_of_measurement: "%"
              mode: slider

        night_start_hour:
          name: "Nacht beginnt (Stunde)"
          default: 22
          selector:
            number:
              min: 18
              max: 23
              step: 1
              unit_of_measurement: "h"
              mode: slider

        night_end_hour:
          name: "Nacht endet (Stunde)"
          default: 6
          selector:
            number:
              min: 0
              max: 12
              step: 1
              unit_of_measurement: "h"
              mode: slider

    # ================================================================
    # SEKTION 6: ERWEITERTE OPTIONEN
    # ================================================================
    section_advanced:
      name: "🔒 Erweiterte Optionen"
      icon: "mdi:shield-check-outline"
      collapsed: true
      input:
        prevent_grid_charging:
          name: "Netzladen verhindern"
          description: "Kein Laden wenn Netzbezug > 50 W (kein teurer Strom in die Batterie)."
          default: true
          selector:
            boolean:

        enable_logging:
          name: "Diagnose-Logging"
          description: "Schreibt jeden Regelschritt ins HA-Log. Für Fehlersuche."
          default: false
          selector:
            boolean:


# ================================================================
# VARIABLEN
# ================================================================
variables:
  v_mode:          !input grid_sensor_mode
  v_combined:      !input grid_power_combined
  v_import:        !input grid_power_import
  v_export:        !input grid_power_export
  v_factor:        !input grid_unit_factor
  v_soc:           !input marstek_soc_sensor
  v_charge_ent:    !input marstek_charge_power
  v_discharge_ent: !input marstek_discharge_power
  v_force_mode:    !input marstek_force_mode
  v_rs485:         !input marstek_rs485_mode
  v_fm_charge:     !input force_mode_charge
  v_fm_discharge:  !input force_mode_discharge
  v_fm_standby:    !input force_mode_standby
  v_rs485_opt:     !input rs485_option_name
  v_target:        !input target_grid_power
  v_dead:          !input dead_band
  v_step_d:        !input step_discharge
  v_step_c:        !input step_charge
  v_max_c:         !input max_charge_power
  v_max_d:         !input max_discharge_power
  v_min_soc:       !input min_soc_protection
  v_max_soc:       !input max_soc_charging
  v_night_on:      !input night_reserve_enabled
  v_night_min:     !input night_min_soc
  v_night_start:   !input night_start_hour
  v_night_end:     !input night_end_hour
  v_no_grid_chg:   !input prevent_grid_charging
  v_logging:       !input enable_logging


# ================================================================
# TRIGGER
# ================================================================
trigger:
  - platform: state
    entity_id: !input grid_power_combined
    for:
      seconds: 2
  - platform: state
    entity_id: !input grid_power_import
    for:
      seconds: 2
  - platform: state
    entity_id: !input grid_power_export
    for:
      seconds: 2
  - platform: time_pattern
    seconds: "/15"


# ================================================================
# BEDINGUNG: Sensoren verfügbar
# ================================================================
condition:
  - condition: template
    value_template: >
      {{ states(v_soc) not in ['unavailable', 'unknown', 'none'] }}


# ================================================================
# AKTION
# ================================================================
action:

  # ---- Schritt 1: RS485-Modus aktivieren ----
  - action: select.select_option
    target:
      entity_id: !input marstek_rs485_mode
    data:
      option: "{{ v_rs485_opt }}"
    continue_on_error: true

  # ---- Schritt 2: Aktuelle Werte berechnen ----
  - variables:
      soc_pct:     "{{ states(v_soc) | float(0) }}"
      charge_w:    "{{ states(v_charge_ent) | float(0) }}"
      discharge_w: "{{ states(v_discharge_ent) | float(0) }}"
      # Netzleistung: kombiniert oder aus zwei getrennten Sensoren berechnen
      grid_w: >
        {% set f = v_factor | string | int(1) %}
        {% if v_mode == 'getrennt' %}
          {% set imp = states(v_import) | float(0) * f %}
          {% set exp = states(v_export) | float(0) * f %}
          {{ (imp - exp) | round(1) }}
        {% else %}
          {{ (states(v_combined) | float(0) * f) | round(1) }}
        {% endif %}
      deviation: >
        {% set f = v_factor | string | int(1) %}
        {% if v_mode == 'getrennt' %}
          {% set imp = states(v_import) | float(0) * f %}
          {% set exp = states(v_export) | float(0) * f %}
          {{ ((imp - exp) - (v_target | float(30))) | round(1) }}
        {% else %}
          {{ ((states(v_combined) | float(0) * f) - (v_target | float(30))) | round(1) }}
        {% endif %}
      is_night: >
        {% set h = now().hour %}
        {% if v_night_start | int > v_night_end | int %}
          {{ h >= v_night_start | int or h < v_night_end | int }}
        {% else %}
          {{ h >= v_night_start | int and h < v_night_end | int }}
        {% endif %}

  # ================================================================
  # REGELLOGIK – priorisiert
  # ================================================================
  - choose:

      # ── P1: TIEFENTLADESCHUTZ ────────────────────────────────────
      # SoC zu niedrig → sofort Standby
      - conditions:
          - condition: template
            value_template: "{{ soc_pct <= v_min_soc | float(10) }}"
        sequence:
          - action: select.select_option
            target:
              entity_id: !input marstek_force_mode
            data:
              option: "{{ v_fm_standby }}"
          - action: number.set_value
            target:
              entity_id: !input marstek_discharge_power
            data:
              value: "0"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] TIEFENTLADESCHUTZ –
                    SoC {{ soc_pct | round(1) }}% <= Mindest {{ v_min_soc }}%.
                    Force Mode = Standby.
                  level: warning

      # ── P2: NACHT-RESERVE ────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ v_night_on
                 and is_night
                 and (v_night_min | float(0)) > 0
                 and soc_pct <= v_night_min | float(20) }}
        sequence:
          - action: select.select_option
            target:
              entity_id: !input marstek_force_mode
            data:
              option: "{{ v_fm_standby }}"
          - action: number.set_value
            target:
              entity_id: !input marstek_discharge_power
            data:
              value: "0"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] NACHT-RESERVE –
                    SoC {{ soc_pct | round(1) }}% <= Reserve {{ v_night_min }}%.
                    Force Mode = Standby.
                  level: info

      # ── P3: TOTZONE – STANDBY ────────────────────────────────────
      # Netz im Zielbereich → Marstek regelt selbst im Eigenverbrauch
      - conditions:
          - condition: template
            value_template: "{{ deviation | abs <= v_dead | float(50) }}"
        sequence:
          - action: select.select_option
            target:
              entity_id: !input marstek_force_mode
            data:
              option: "{{ v_fm_standby }}"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] TOTZONE –
                    Netz={{ grid_w }} W | Abw={{ deviation | round(0) }} W <= Deadband.
                    Force Mode = Standby.
                  level: debug

      # ── P4: NETZBEZUG → ENTLADEN ─────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ deviation > (v_dead | float(50))
                 and soc_pct > (v_min_soc | float(10)) }}
        sequence:
          - variables:
              new_discharge: >
                {{ [ [ discharge_w + (v_step_d | float(100)),
                        v_max_d | float(2400) ] | min,
                      0 ] | max | round(0) | int }}
          # Force Mode auf Entladen setzen
          - action: select.select_option
            target:
              entity_id: !input marstek_force_mode
            data:
              option: "{{ v_fm_discharge }}"
          # Ladeleistung auf 0 setzen (Gegenrichtung immer nullen!)
          - action: number.set_value
            target:
              entity_id: !input marstek_charge_power
            data:
              value: "0"
          # Entladeleistung schrittweise erhöhen
          - action: number.set_value
            target:
              entity_id: !input marstek_discharge_power
            data:
              value: "{{ new_discharge }}"
          # Warten damit Marstek reagieren kann
          - delay:
              seconds: "{{ v_delay | default(7) }}"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] ENTLADEN –
                    Netz={{ grid_w }} W | Abw={{ deviation | round(0) }} W |
                    SoC={{ soc_pct }}% |
                    Force={{ v_fm_discharge }} | Entlade={{ new_discharge }} W
                  level: info

      # ── P5: EINSPEISUNG → LADEN ───────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ deviation < ((v_dead | float(50)) * -1)
                 and soc_pct < (v_max_soc | float(95)) }}
        sequence:
          - variables:
              raw_charge: >
                {{ [ [ charge_w + (v_step_c | float(80)),
                        v_max_c | float(2400) ] | min,
                      0 ] | max | round(0) | int }}
              # Netzladen-Sperre: kein Laden wenn Netz positiv (Bezug)
              new_charge: >
                {{ 0 if (v_no_grid_chg and grid_w > 50) else raw_charge }}
          # Force Mode auf Laden setzen
          - action: select.select_option
            target:
              entity_id: !input marstek_force_mode
            data:
              option: "{{ v_fm_charge }}"
          # Entladeleistung auf 0 setzen
          - action: number.set_value
            target:
              entity_id: !input marstek_discharge_power
            data:
              value: "0"
          # Ladeleistung schrittweise erhöhen
          - action: number.set_value
            target:
              entity_id: !input marstek_charge_power
            data:
              value: "{{ new_charge }}"
          - delay:
              seconds: "{{ v_delay | default(7) }}"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] LADEN –
                    Netz={{ grid_w }} W | Abw={{ deviation | round(0) }} W |
                    Netzladen-Sperre={{ v_no_grid_chg }} |
                    Force={{ v_fm_charge }} | Lade={{ new_charge }} W
                  level: info

mode: single
max_exceeded: silent
