blueprint:
  name: "🔋 Marstek Venus E3 – Nulleinspeisung & Eigenverbrauchsoptimierung"
  description: >
    **Dynamische Nulleinspeisung für den Marstek Venus E3 Heimspeicher.**


    Die Automation überwacht die aktuelle Netzleistung und regelt
    Lade- und Entladeleistung automatisch – Einspeisung ins Netz
    wird verhindert, Eigenverbrauch maximiert.


    **Enthaltene Schutzfunktionen:**

    • ⚠️ Tiefentladeschutz (konfigurierbarer Mindest-SoC)

    • 🌙 Nacht-Reserve (Mindestladung bis zum Morgen erhalten)

    • 🔒 Netzladen-Sperre (Batterie nicht aus dem Netz laden)

    • 🎯 Totzone / Hysterese (Regler-Stabilität)


    **Kompatible Netzmessgeräte:**

    Shelly EM/3EM, Eastron SDM630, Holley DTZ541, ISKRA MT174,
    Tibber Pulse (mit Template-Sensor – siehe README), Discovergy


    **Voraussetzungen:**

    • Netzmessgerät mit HA-Integration

    • Marstek Venus E3 in Home Assistant integriert (Modbus/RS485)


    ⚡ Entwickelt von [LichtValleyApps.de](https://lichtvalleyapps.de) –
    SmartHome & Eigenverbrauchsoptimierung

  domain: automation
  author: "LichtValleyApps.de"
  source_url: "https://github.com/HatchetMan111/marstek-venus-e3-nulleinspeisung-blueprint/blob/main/blueprints/automation/marstek_venus_e3_nulleinspeisung.yaml"
  homeassistant:
    min_version: "2024.6.0"

  input:

    section_grid:
      name: "📡 Netz-Messung"
      icon: "mdi:transmission-tower"
      description: >
        Sensor für die aktuelle Netzleistung in Watt.
        ✅ Positiv = Netzbezug | ✅ Negativ = Netzeinspeisung.
        Tibber Pulse: Template-Sensor nötig – siehe README.
      input:
        grid_power_sensor:
          name: "Netzleistung Sensor (W)"
          description: >
            Sensor mit positivem Wert bei Netzbezug,
            negativem Wert bei Einspeisung.
          selector:
            entity:
              domain: sensor
              device_class: power

    section_battery:
      name: "🔋 Marstek Venus E3 – Entitäten"
      icon: "mdi:battery-charging-80"
      description: >
        Alle Entitäten findest du unter:
        Einstellungen → Geräte & Dienste → Marstek → [dein Gerät]
      input:
        marstek_soc_sensor:
          name: "Batterie-Ladezustand (SoC %)"
          description: "Sensor: 'Batterie-Ladezustand'"
          selector:
            entity:
              domain: sensor
              device_class: battery

        marstek_charge_power:
          name: "Ladeleistung einstellen (Number)"
          description: "Number-Entity: 'Ladeleistung einstellen' in Watt"
          selector:
            entity:
              domain: number

        marstek_discharge_power:
          name: "Entladeleistung einstellen (Number)"
          description: "Number-Entity: 'Entladeleistung einstellen' in Watt"
          selector:
            entity:
              domain: number

        marstek_mode_eigenverbrauch:
          name: "Modus Eigenverbrauch (Switch)"
          description: "Switch-Entity: 'Modus Eigenverbrauch'"
          selector:
            entity:
              domain: switch

        marstek_rs485_mode:
          name: "RS485-Steuermodus (Select)"
          description: >
            Select-Entity: 'RS485-Steuermodus'.
            Wird automatisch auf 'RS485' gesetzt.
          selector:
            entity:
              domain: select

    section_regulation:
      name: "⚙️ Regelparameter"
      icon: "mdi:tune-variant"
      description: "Empfohlene Standardwerte sind voreingestellt."
      input:
        target_grid_power:
          name: "Ziel-Netzleistung (W)"
          description: >
            Angestrebter Netzwert. 0 W = echte Nulleinspeisung.
            Empfehlung: 30–50 W als Sicherheitspuffer.
          default: 30
          selector:
            number:
              min: -100
              max: 300
              step: 10
              unit_of_measurement: "W"
              mode: slider

        dead_band:
          name: "Totzone / Hysterese (W)"
          description: >
            Toleranzbereich um den Zielwert – kein Regeln innerhalb.
            Empfehlung: 40–60 W. Bei Reglerschwingen erhöhen.
          default: 40
          selector:
            number:
              min: 10
              max: 200
              step: 10
              unit_of_measurement: "W"
              mode: slider

        regulation_gain:
          name: "Regelungsverstärkung (Faktor)"
          description: >
            1.0 = direkte Kompensation | 1.2 = 20% aggressiver.
            Bei Überschwingen auf 0.9 reduzieren.
          default: 1.0
          selector:
            number:
              min: 0.5
              max: 2.0
              step: 0.1
              mode: slider

        max_charge_power:
          name: "Maximale Ladeleistung (W)"
          description: "Marstek Venus E3 max: 2500 W"
          default: 2400
          selector:
            number:
              min: 100
              max: 2500
              step: 50
              unit_of_measurement: "W"
              mode: slider

        max_discharge_power:
          name: "Maximale Entladeleistung (W)"
          description: "Marstek Venus E3 max: 2500 W"
          default: 2400
          selector:
            number:
              min: 100
              max: 2500
              step: 50
              unit_of_measurement: "W"
              mode: slider

        min_soc_protection:
          name: "Tiefentladeschutz – Mindest-SoC (%)"
          description: "Unter diesem SoC wird Entladung gestoppt. Empfehlung: 10–15 %."
          default: 10
          selector:
            number:
              min: 5
              max: 30
              step: 1
              unit_of_measurement: "%"
              mode: slider

    section_night:
      name: "🌙 Nacht-Modus & Reserve"
      icon: "mdi:weather-night"
      collapsed: true
      description: "Hält nachts einen Mindest-SoC zurück für den Morgenverbrauch."
      input:
        night_reserve_enabled:
          name: "Nacht-Reserve aktivieren"
          default: true
          selector:
            boolean:

        night_min_soc:
          name: "Nacht-Reserve SoC (%)"
          description: "Empfehlung: 20–30 % (ca. 1–1,5 kWh Grundlast)"
          default: 20
          selector:
            number:
              min: 0
              max: 80
              step: 5
              unit_of_measurement: "%"
              mode: slider

        night_start_hour:
          name: "Nacht beginnt (Stunde 0–23)"
          default: 22
          selector:
            number:
              min: 18
              max: 23
              step: 1
              unit_of_measurement: "h"
              mode: slider

        night_end_hour:
          name: "Nacht endet (Stunde 0–12)"
          default: 6
          selector:
            number:
              min: 0
              max: 12
              step: 1
              unit_of_measurement: "h"
              mode: slider

    section_advanced:
      name: "🔒 Erweiterte Optionen"
      icon: "mdi:shield-check-outline"
      collapsed: true
      input:
        prevent_grid_charging:
          name: "Netzladen verhindern"
          description: "Batterie wird NICHT aus dem Netz geladen. Spart Kosten, schont die Batterie."
          default: true
          selector:
            boolean:

        enable_logging:
          name: "Diagnose-Logging aktivieren"
          description: "Log-Ausgabe für Fehlersuche. Im Normalbetrieb deaktiviert lassen."
          default: false
          selector:
            boolean:


variables:
  v_grid:          !input grid_power_sensor
  v_soc:           !input marstek_soc_sensor
  v_charge_ent:    !input marstek_charge_power
  v_discharge_ent: !input marstek_discharge_power
  v_target:        !input target_grid_power
  v_dead_band:     !input dead_band
  v_gain:          !input regulation_gain
  v_max_charge:    !input max_charge_power
  v_max_discharge: !input max_discharge_power
  v_min_soc:       !input min_soc_protection
  v_night_on:      !input night_reserve_enabled
  v_night_min:     !input night_min_soc
  v_night_start:   !input night_start_hour
  v_night_end:     !input night_end_hour
  v_no_grid_chg:   !input prevent_grid_charging
  v_logging:       !input enable_logging


trigger:
  - platform: state
    entity_id: !input grid_power_sensor
    for:
      seconds: 2
  - platform: time_pattern
    seconds: "/20"


condition:
  - condition: template
    value_template: >
      {{ states(v_grid) not in ['unavailable', 'unknown', 'none']
         and states(v_soc) not in ['unavailable', 'unknown', 'none'] }}


action:

  - variables:
      grid_w:      "{{ states(v_grid) | float(0) | round(1) }}"
      soc_pct:     "{{ states(v_soc) | float(0) }}"
      charge_w:    "{{ states(v_charge_ent) | float(0) }}"
      discharge_w: "{{ states(v_discharge_ent) | float(0) }}"
      deviation:   "{{ (states(v_grid) | float(0)) - (v_target | float(30)) }}"
      is_night: >
        {% set h = now().hour %}
        {% if v_night_start | int > v_night_end | int %}
          {{ h >= v_night_start | int or h < v_night_end | int }}
        {% else %}
          {{ h >= v_night_start | int and h < v_night_end | int }}
        {% endif %}

  - action: switch.turn_on
    target:
      entity_id: !input marstek_mode_eigenverbrauch
    continue_on_error: true

  - action: select.select_option
    target:
      entity_id: !input marstek_rs485_mode
    data:
      option: "RS485"
    continue_on_error: true

  - choose:

      # PRIORITÄT 1: TIEFENTLADESCHUTZ
      - conditions:
          - condition: template
            value_template: "{{ soc_pct <= v_min_soc | float(10) }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: !input marstek_discharge_power
            data:
              value: "0"
          - action: number.set_value
            target:
              entity_id: !input marstek_charge_power
            data:
              value: "100"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] ⚠️ TIEFENTLADESCHUTZ –
                    SoC {{ soc_pct | round(1) }}% <= Mindest {{ v_min_soc }}%.
                    Entladung gestoppt.
                  level: warning

      # PRIORITÄT 2: NACHT-RESERVE
      - conditions:
          - condition: template
            value_template: >
              {{ v_night_on
                 and is_night
                 and (v_night_min | float(0)) > 0
                 and soc_pct <= v_night_min | float(20) }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input marstek_discharge_power
            data:
              value: "0"
          - action: number.set_value
            target:
              entity_id: !input marstek_charge_power
            data:
              value: "0"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] Nacht-Reserve –
                    SoC {{ soc_pct | round(1) }}% <= Reserve {{ v_night_min }}%.
                    Entladen pausiert.
                  level: info

      # PRIORITÄT 3: NETZBEZUG -> ENTLADEN
      - conditions:
          - condition: template
            value_template: >
              {{ deviation > (v_dead_band | float(40))
                 and soc_pct > (v_min_soc | float(10)) }}
        sequence:
          - variables:
              new_discharge: >
                {{ [ [ (discharge_w + (deviation * (v_gain | float(1.0)))) | round(0) | int,
                        v_max_discharge | int ] | min,
                      0 ] | max }}
          - action: number.set_value
            target:
              entity_id: !input marstek_discharge_power
            data:
              value: "{{ new_discharge }}"
          - action: number.set_value
            target:
              entity_id: !input marstek_charge_power
            data:
              value: "0"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] ENTLADEN –
                    Netz={{ grid_w }} W | Abw={{ deviation | round(0) }} W |
                    SoC={{ soc_pct }}% -> Entlade={{ new_discharge }} W
                  level: info

      # PRIORITÄT 4: EINSPEISUNG -> LADEN
      - conditions:
          - condition: template
            value_template: >
              {{ deviation < ((v_dead_band | float(40)) * -1) }}
        sequence:
          - variables:
              excess_w: "{{ (deviation | abs) | round(0) | int }}"
              raw_charge: >
                {{ [ [ (charge_w + (excess_w * (v_gain | float(1.0)))) | round(0) | int,
                        v_max_charge | int ] | min,
                      0 ] | max }}
              new_charge: >
                {{ 0 if (v_no_grid_chg and grid_w > 50) else raw_charge }}
          - action: number.set_value
            target:
              entity_id: !input marstek_charge_power
            data:
              value: "{{ new_charge }}"
          - action: number.set_value
            target:
              entity_id: !input marstek_discharge_power
            data:
              value: "0"
          - if:
              - condition: template
                value_template: "{{ v_logging }}"
            then:
              - action: system_log.write
                data:
                  message: >
                    [LVA Nulleinspeisung] LADEN –
                    Netz={{ grid_w }} W | Ueberschuss={{ excess_w }} W |
                    Netzladen-Sperre={{ v_no_grid_chg }} -> Lade={{ new_charge }} W
                  level: info

      # PRIORITÄT 5: TOTZONE – FEINJUSTIERUNG
      - conditions:
          - condition: template
            value_template: "{{ deviation | abs <= v_dead_band | float(40) }}"
        sequence:
          - variables:
              fine: "{{ (deviation * 0.3) | round(0) | int }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ fine > 15 and soc_pct > (v_min_soc | float(10)) }}
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input marstek_discharge_power
                    data:
                      value: >
                        {{ [ [ discharge_w + fine, v_max_discharge | int ] | min,
                              0 ] | max | int }}
              - conditions:
                  - condition: template
                    value_template: "{{ fine < -15 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input marstek_charge_power
                    data:
                      value: >
                        {{ [ [ charge_w + (fine | abs), v_max_charge | int ] | min,
                              0 ] | max | int }}

mode: single
max_exceeded: silent
